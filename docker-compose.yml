version: '3.9'

services:

  # ── PHP/Laravel + Apache ────────────────────────────
  web:
    build: .
    container_name: clinichub_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=clinic_db
      - DB_USERNAME=root
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
    volumes:
      - ./storage:/var/www/html/storage
      - ./public/images:/var/www/html/public/images
    networks:
      - clinichub_net

  # ── MariaDB ──────────────────────────────────────────
  db:
    image: mariadb:10.4
    container_name: clinichub_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: clinic_db
    volumes:
      - clinichub_dbdata:/var/lib/mysql
      # Optional: seed with original SQL on fresh start
      # - ./clinic_db.sql:/docker-entrypoint-initdb.d/clinic_db.sql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clinichub_net

volumes:
  clinichub_dbdata:

networks:
  clinichub_net:
    driver: bridge
